<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:30px;
width:40%;
margin:auto;
margin-top:100px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#4F46E5;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>
<br>

<input type="password" name="password" placeholder="Password" required>
<br>

<button type="submit">Login</button>

</form>

<p>Don't have account? <a href="/signup">Signup</a></p>

</div>

</body>
</html>
