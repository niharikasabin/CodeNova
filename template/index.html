<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:30px;
width:60%;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

.result{
text-align:left;
margin-top:20px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Resume Analyzer</h2>

<form action="/analyze" method="post" enctype="multipart/form-data">

<input type="file" name="resume" required>

<br><br>

<button type="submit">Analyze Resume</button>

</form>

{% if analysis %}

<h3>Resume Improvements</h3>

<div class="result">
{{analysis}}
</div>

{% endif %}

{% if questions %}

<h3>AI Interview Questions</h3>

<div class="result">
{{questions}}
</div>

{% endif %}

</div>

</body>
</html>
